<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form action="results.html" method="GET" enctype="multipart/form-data">
        <div>
            <label for="username">Username</label>
            <input name = "username" id="username" placeholder="username" required>            
        </div>
        <div>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="email address" required>
        </div>
        <div>
            <label for="age">Age</label>
            <input type="number" name="age" id="age" required min="1" max="200" step="5">
        </div>
        <div>
            <label for="date">Birthdate</label>
            <input type="date" id="date" name="date" min="2000-01-01">
        </div>
        <div>
            <label>
                Password
                <input type="password" name = "password" placeholder="password" required>
            </label>
        </div>

        <div>
            <br>
            Select all that apply:
            <div>
                <label for="mcq1">You are currently a US citizen</label>
                <input type="checkbox" name="mcq1" id="mcq1">
            </div>
            <div>
                <label for="mcq2">You are currencly eomployed.</label>
                <input type="checkbox" name="mcq2" id="mcq2">
            </div>
            <div>
                <label for="mcq3">You are a US veteran.</label>
                <input type="checkbox" name="mcq3" id="mcq3">
            </div>
        </div>

        <div>
            <br>
            Select your gender-type:
            <div>
                <label for="gender1">Normal</label>
                <input type="radio" name="gender1" id="gender1" value="1">
            </div>
            <div>
                <label for="gender2">Cis</label>
                <input type="radio" name="gender2" id="gender2" value="2">
            </div>
            <div>
                <label for="gender3">Other</label>
                <input type="radio" name="gender3" id="gender3" value="3">
            </div>
        </div>

        <div>
            <br>
            Select your eye color:
            <label for="eyecolor">Eye Color</label>
            <select name="eyeColor" id="eyeColor">
                <option value = "brown">Brown</option>
                <option value = "blue">Blue</option>
                <option value = "green">Green</option>
            </select>
        </div>

        <div>
            <br>
            <label for="about">Tell me a fun fact about yourself:</label>
            <textarea id="aoubt" id="about" placeholder="type here..."></textarea>
        </div>

        <input type="hidden" name="hidden" value="Hello there :3">

        <div>
            <br>
            <label for="file">Upload a file</label>
            <input type="file" name="file" id="file">
        </div>

        <div>
            <br>
            <label for="phone">Phone Number</label>
            <input type="tel" name="phone" id="phone">
        </div>

        <div>
            <br>
            <label for="url">URL</label>
            <input type="url" name="url" id="url">
        </div>
            
        <div>
            <br>
            <label for="color">Color</label>
            <input type="color" name="color" id="color">
        </div>

        <br>
        <button type="reset">Clear</button>
        <button type="submit">Submit</button>
    </form>

    <script src="index.js"></script>
</body>
</html>
